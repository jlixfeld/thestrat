name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv tool install ruff
      - run: uv tool install mypy
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy . || true

  claude-review:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude review chain
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: |
            code-review@claude-code-plugins
            pr-review-toolkit@claude-code-plugins
          show_full_output: true
          claude_args: "--max-turns 30"
          prompt: |
            Review PR ${{ github.repository }}#${{ github.event.pull_request.number }} by running each of the following slash commands in order. Each command posts its own findings as PR comments — do not duplicate them.

            /simplify
            /pr-review-toolkit:review-pr
            /security-review
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}
